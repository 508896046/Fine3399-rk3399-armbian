# .github/workflows/main.yml
name: Main
on:
  push:
    branches:
      - 'master'
      - 'main'
      - '!test'

jobs:
  gdrive-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Archive files
        run: |
          sudo apt-get update
          sudo apt-get install zip
          zip -r archive.zip *

      - name: Upload file
        uses: tomasbkk/action-ftp-upload@v1.0
        with:
            user: 3398862633
            password: 3398862633
            host: 43.128.250.47
            src: archive.zip
            dest: archive/app/file.zip

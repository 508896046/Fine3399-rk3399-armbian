name: testonly

on:
  repository_dispatch:
  workflow_dispatch:
   
jobs:
 build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
    - name: Checkout source
      uses: actions/checkout@v3
     

    - name: Setup Node.js
      uses: actions/setup-node@v3
    

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build # 构建需要发布的文件

    - name: Compress files
      run: |
         tar -czf release-v${{ github.ref_name }}.tar.gz dist/
    - name: Upload file
      uses: tomasbkk/action-ftp-upload@v1.0
      with:
            user: 3398862633
            password: 3398862633
            host: 43.128.250.47
            src:  release-v${{ github.ref_name }}.tar.gz
            dest: archive/


     
